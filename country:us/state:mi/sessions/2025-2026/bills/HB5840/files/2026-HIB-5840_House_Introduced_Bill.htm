<p class=BillTitle>A bill to designate Vaisakhi or Baisakhi as a holiday in
this state.</p>

<p class=Enactment>the people of the state of michigan enact:</p>

<p class=Statute><a name="sec_import_start_1_1"></a>Sec. 1. The legislature
declares that April 13 and <span style='color:black'>April </span>14 of each
year shall be known as &quot;Vaisakhi&quot;<span style='color:black'> or
&quot;Baisakhi&quot;, a significant holy day for Sikhs and Hindus</span>.</p>
